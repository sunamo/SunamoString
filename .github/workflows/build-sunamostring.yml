name: Build SunamoString

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build SunamoString
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore SunamoString/SunamoString.csproj

    - name: Build
      run: dotnet build SunamoString/SunamoString.csproj --configuration Release --no-restore

  test:
    name: Test SunamoString.Tests
    runs-on: ${{ matrix.os }}
    needs: build

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore SunamoString.Tests/SunamoString.Tests.csproj

    - name: Build tests
      run: dotnet build SunamoString.Tests/SunamoString.Tests.csproj --configuration Release --no-restore

    - name: Run tests
      run: dotnet test SunamoString.Tests/SunamoString.Tests.csproj --configuration Release --no-build --verbosity normal
      continue-on-error: true
